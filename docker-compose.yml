version: '3.8'

services:
  # Main Web Application (Apache + PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bhimaswari-app:latest
    container_name: bhimaswari_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bhimaswari
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app_network

  # Queue Worker (for background jobs)
  queue:
    image: bhimaswari-app:latest
    container_name: bhimaswari_queue
    restart: unless-stopped
    command: php artisan queue:work
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bhimaswari
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app_network

  # Laravel Reverb (WebSockets Server)
  reverb:
    image: bhimaswari-app:latest
    container_name: bhimaswari_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bhimaswari
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app_network

  # Task Scheduler (Cron equivalent)
  scheduler:
    image: bhimaswari-app:latest
    container_name: bhimaswari_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bhimaswari
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app_network

  # Caddy Reverse Proxy (For HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: bhimaswari_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - app_network

  # Database Service
  db:
    image: mysql:8.0
    container_name: bhimaswari_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bhimaswari
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  app_network:
    driver: bridge
